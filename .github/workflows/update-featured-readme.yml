name: Auto-Update All Projects

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Generate All Projects List
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: Akshay-Ramesh-VITC
        run: |
          python3 << 'EOF'
          import os
          import requests
          from datetime import datetime
          import pytz

          token = os.environ['GH_TOKEN']
          username = os.environ['USERNAME']
          
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json'
          }

          # Fetch all repositories
          print("Fetching all repositories...")
          all_repos = []
          page = 1
          
          while True:
              url = f'https://api.github.com/user/repos?affiliation=owner&per_page=100&page={page}'
              response = requests.get(url, headers=headers)
              
              if response.status_code != 200:
                  print(f"Error: {response.status_code}")
                  break
                  
              repos = response.json()
              if not repos:
                  break
                  
              all_repos.extend(repos)
              page += 1

          print(f"Found {len(all_repos)} total repositories")

          display_repos = []
          
          for repo in all_repos:
              # Skip the profile README repo itself
              if repo.get('name') == username:
                  continue
              
              display_repos.append(repo)

          # Sort by stars, then by update date
          display_repos.sort(
              key=lambda x: (x.get('stargazers_count', 0), x.get('updated_at', '')), 
              reverse=True
          )

          print(f"\n{'='*60}")
          print("ALL REPOSITORIES:")
          print(f"{'='*60}")
          print(f"Total projects to display: {len(display_repos)}")
          print(f"{'='*60}\n")

          for repo in display_repos:
              is_private = repo.get('private', False)
              privacy = "🔒 PRIVATE" if is_private else "🌐 Public"
              stars = repo.get('stargazers_count', 0)
              name = repo.get('name', 'Unknown')
              print(f"  • {name:<40} {privacy:<15} ⭐ {stars}")

          # Generate markdown table
          projects_md = "### 🚀 My Projects\n\n"
          
          if len(display_repos) > 0:
              projects_md += "| Project | Description | Language | Status | Stars |\n"
              projects_md += "|---------|-------------|----------|--------|-------|\n"
              
              for repo in display_repos:
                  repo_name = repo.get('name', 'Unknown')
                  repo_url = repo.get('html_url', '#')
                  description = (repo.get('description') or 'Project')
                  
                  # Truncate long descriptions
                  if len(description) > 50:
                      description = description[:47] + '...'
                  
                  language = repo.get('language') or 'Code'
                  stars = repo.get('stargazers_count', 0)
                  is_private = repo.get('private', False)
                  
                  # Status badge
                  if is_private:
                      status_badge = "![Private](https://img.shields.io/badge/Private-red?style=flat-square&logo=github)"
                  else:
                      status_badge = "![Public](https://img.shields.io/badge/Public-green?style=flat-square&logo=github)"
                  
                  # Language badge
                  lang_color = {
                  'Python': '3776AB',
                  'JavaScript': 'F7DF1E',
                  'Java': '007396',
                  'C++': '00599C',
                  'C': 'A8B9CC',
                  'TypeScript': '3178C6',
                  'HTML': 'E34F26',
                  'CSS': '1572B6',
                  'Jupyter Notebook': 'F37626',
                  'R': '276DC3',
                  'Shell': '89e051',
                  'Go': '00ADD8'
                  }.get(language, '808080')
                  
                  lang_encoded = language.replace(' ', '%20').replace('+', '%2B')
                  lang_badge = f"![{language}](https://img.shields.io/badge/{lang_encoded}-{lang_color}?style=flat-square&logo=python)"

                  # Project name as link
                  name_link = f"**[{repo_name}]({repo_url})**"
                  
                  projects_md += f"| {name_link} | {description} | {lang_badge} | {status_badge} | ⭐ {stars} |\n"
          else:
              projects_md += "*No projects found*\n"

          private_count = sum(1 for r in display_repos if r.get('private', False))
          public_count = len(display_repos) - private_count

          # Get current time in IST
          ist = pytz.timezone('Asia/Kolkata')
          ist_time = datetime.now(ist)
          
          projects_md += f"\n*🤖 Auto-updated: {ist_time.strftime('%Y-%m-%d %H:%M IST')} • "
          projects_md += f"{len(display_repos)} projects ({public_count} public, {private_count} private)*\n"

          # Save to file
          with open('featured_projects.md', 'w', encoding='utf-8') as f:
              f.write(projects_md)

          print("\n" + "="*60)
          print("GENERATED MARKDOWN:")
          print("="*60)
          print(projects_md)
          print("="*60)

          EOF

      - name: Update README
        run: |
          if grep -q "" README.md && grep -q "" README.md; then
            sed -n '1,//p' README.md > temp_readme.md
            cat featured_projects.md >> temp_readme.md
            sed -n '//,$p' README.md >> temp_readme.md
            mv temp_readme.md README.md
            echo "✅ README updated successfully"
          else
            echo "❌ Error: Markers not found in README.md"
            echo "Please ensure and exist in README.md"
            exit 1
          fi

      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions Bot"
          git add README.md
          
          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "🚀 Auto-update all projects [$(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M IST')]"
            git push
            echo "✅ Changes pushed successfully"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### ✅ Workflow Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Projects section updated with ALL public and private repositories." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Updated:** $(TZ='Asia/Kolkata' date +'%Y-%m-%d %H:%M:%S IST')" >> $GITHUB_STEP_SUMMARY
